<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Freestyle — App Redesign</title>

<link rel="icon" type="image/svg+xml" href="logo/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=DM+Sans:opsz,wght@9..40,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --canvas:    #F4F0E4;
    --paper:     #ECE7D6;
    --elevated:  #FBF8EE;
    --rule:      #D6CDB8;
    --rule-soft: #E3DCC8;
    --ink:       #16140F;
    --ink-soft:  #34302A;
    --mute:      #7B7461;
    --olive:     #6B8F12;
    --olive-deep:#4A6309;
    --olive-ink: #2E3F05;
    --olive-soft:#E8EFC9;
    --blush:     #DD6E4E;
    --plum:      #5E4E78;
    /* dark companion (for the pill which sits over any desktop) */
    --d-ink:    #0F0E0B;
    --d-card:   #1B1A14;
    --d-text:   #ECE7D6;
    --d-mute:   #7C7561;
    --d-rule:   #2A2820;
  }
  html, body { background: var(--canvas); margin: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .serif        { font-family: 'Newsreader', 'Iowan Old Style', 'Times New Roman', serif; font-variation-settings: 'opsz' 72; letter-spacing: -0.01em; line-height: 1.05; }
  .serif-italic { font-family: 'Newsreader', 'Iowan Old Style', 'Times New Roman', serif; font-style: italic; font-variation-settings: 'opsz' 72; letter-spacing: -0.005em; line-height: 1.05; }
  .mono         { font-family: 'JetBrains Mono', monospace; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="r-art.jsx"></script>
<script type="text/babel" src="r-pill.jsx"></script>
<script type="text/babel" src="r-shells.jsx"></script>
<script type="text/babel" src="r-settings.jsx"></script>
<script type="text/babel" src="r-more.jsx"></script>
<script type="text/babel" src="r-onboarding.jsx"></script>
<script type="text/babel" src="r-home.jsx"></script>

</body>
</html>
